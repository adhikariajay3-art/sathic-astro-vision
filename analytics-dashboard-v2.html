<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SATHIC ASTRO VISION - Analytics Dashboard V2</title>
<style>
:root{--gold:#c9a84c;--gold2:#e8c97a;--bg:#0a0806;--bg2:#1a1510;--bg3:#221c13;--line:rgba(201,168,76,.22);--text:#f0e6cc;--muted:#9a8a6a;--red:#c0392b;--green:#27ae60;--amber:#d4ac0d}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh}.header{background:linear-gradient(180deg,#1a1510,#0f0c08);border-bottom:1px solid var(--line);padding:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:0;z-index:10}.brand{font-size:15px;font-weight:800;color:var(--gold);letter-spacing:.08em}.brand span{display:block;font-size:10px;color:var(--muted);letter-spacing:.16em;margin-top:3px}.tools{display:flex;gap:8px;align-items:center}.select,.btn{border:1px solid var(--line);border-radius:8px;padding:9px 12px;background:var(--bg3);color:var(--text)}.btn{background:var(--gold);color:#120d02;font-weight:700;cursor:pointer}.main{max-width:1180px;margin:auto;padding:22px 14px 70px}.title{font-size:13px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin:8px 0 18px;display:flex;align-items:center;gap:10px}.title:after{content:"";height:1px;background:var(--line);flex:1}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:0 18px 45px rgba(0,0,0,.25)}.kpi{position:relative;overflow:hidden}.kpi:before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--gold))}.label{font-size:10px;color:#7d7059;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}.value{font-size:30px;font-weight:300;margin-bottom:6px}.sub{font-size:12px;color:var(--muted);line-height:1.45}.badge{display:inline-block;margin-top:7px;padding:3px 8px;border-radius:999px;font-size:11px}.green{background:rgba(39,174,96,.15);color:#2ecc71}.red{background:rgba(192,57,43,.15);color:#e74c3c}.amber{background:rgba(212,172,13,.15);color:var(--amber)}.gold{background:rgba(201,168,76,.15);color:var(--gold)}.section{margin:22px 0}.sectionHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.sectionHead h2{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:var(--gold)}.bars{height:150px;display:flex;align-items:flex-end;gap:8px}.barCol{flex:1;text-align:center}.bar{background:linear-gradient(180deg,var(--gold2),#8b6f35);border-radius:5px 5px 0 0;min-height:5px}.barLab{font-size:10px;color:var(--muted);margin-top:6px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}table{width:100%;border-collapse:collapse}th{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:#7d7059;text-align:left;padding-bottom:10px;border-bottom:1px solid var(--line)}td{padding:11px 0;border-bottom:1px solid rgba(201,168,76,.08);font-size:13px}.right{text-align:right}.rank{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;background:rgba(201,168,76,.12);color:var(--gold);font-size:11px;margin-right:8px}.funnel{display:flex;flex-direction:column;gap:8px}.frow{display:grid;grid-template-columns:115px 1fr 42px;gap:8px;align-items:center}.fbar{height:24px;background:var(--bg3);border-radius:6px;overflow:hidden}.fill{height:100%;background:var(--gold);color:#100b05;font-size:11px;font-weight:700;display:flex;align-items:center;padding-left:8px}.list{display:flex;flex-direction:column;gap:8px}.item{display:flex;justify-content:space-between;gap:10px;align-items:center;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:12px}.item b{font-size:13px}.item small{display:block;color:var(--muted);margin-top:3px}.miniBtn{border:1px solid var(--line);background:rgba(201,168,76,.12);color:var(--gold);border-radius:7px;padding:7px 10px;white-space:nowrap;cursor:pointer}.toast{position:fixed;right:18px;bottom:18px;background:var(--bg2);border:1px solid var(--gold);color:var(--gold);padding:10px 14px;border-radius:8px;display:none}.toast.show{display:block}@media(max-width:900px){.kpis,.grid2{grid-template-columns:1fr}.header{display:block}.tools{margin-top:12px}.kpis{gap:10px}.bars{height:120px}.frow{grid-template-columns:90px 1fr 36px}.value{font-size:26px}}@media(max-width:560px){.main{padding:16px 10px 60px}.tools{display:grid;grid-template-columns:1fr}.select,.btn{width:100%}.card{padding:14px}.item{display:block}.miniBtn{margin-top:9px;width:100%}}
</style>
</head>
<body>
<header class="header"><div class="brand">SATHIC ASTRO VISION™<span>ANALYTICS DASHBOARD V2</span></div><div class="tools"><select class="select" id="period" onchange="changePeriod()"><option>This Month</option><option>This Week</option><option>This Quarter</option><option>This Year</option></select><button class="btn" onclick="exportData()">↓ Export Data</button></div></header>
<main class="main"><div class="title">Revenue & Conversion Overview</div><section class="kpis" id="kpis"></section><section class="section"><div class="sectionHead"><h2>Monthly Revenue Trend</h2><span class="sub" id="totalText"></span></div><div class="card"><div class="bars" id="bars"></div></div></section><section class="grid2 section"><div class="card"><div class="sectionHead"><h2>Service-wise Revenue</h2></div><table><thead><tr><th>Service</th><th class="right">Bookings</th><th class="right">Revenue</th></tr></thead><tbody id="services"></tbody></table></div><div class="card"><div class="sectionHead"><h2>Conversion Funnel</h2></div><div class="funnel" id="funnel"></div></div></section><section class="grid2 section"><div class="card"><div class="sectionHead"><h2>Upsell Opportunities</h2></div><div class="list" id="upsells"></div></div><div class="card"><div class="sectionHead"><h2>Abandoned Bookings — Recover करें</h2></div><div class="list" id="abandoned"></div></div></section></main><div class="toast" id="toast">Copied</div>
<script>
const metrics={leads:148,paid:54,pending:31,abandoned:19,revenue:324000,conv:36,upsell:17};
const months=[['Jan',95],['Feb',120],['Mar',88],['Apr',150],['May',210],['Jun',324]];
const services=[['Kundali Milan',22,149990],['Premium Kundli Report',14,94500],['Vastu Consultation',8,40800],['Career Consultation',7,28700],['Membership',18,8982]];
const funnel=[['Leads',148,100,'#c9a84c'],['Qualified',92,62,'#e8c97a'],['Payment Pending',31,21,'#d4ac0d'],['Paid',54,36,'#27ae60'],['Abandoned',19,13,'#c0392b']];
const upsells=[['Ramesh Solanki','Kundli Report → Premium Consultation','₹5,100 potential'],['Meena Jain','Vastu Checklist → Full Vastu','₹5,100 potential'],['Amit Patel','Basic Report → Annual Guidance','₹11,000 potential'],['Neha Sharma','Career Call → Membership','₹499/month']];
const abandoned=[['Sonali Solanki','Kundli Report form filled, no payment','Send recovery'],['Mukesh Ji','Vastu inquiry, payment pending','Send reminder'],['Priya Rathod','Marriage consultation abandoned','Offer coupon'],['Ravi Kumar','Report booking incomplete','WhatsApp now']];
function fmt(n){return '₹'+Math.round(n/1000)+'K'}
function render(){document.getElementById('kpis').innerHTML=[['Total Leads',metrics.leads,'Inquiries received','↑ 23%','gold'],['Paid Clients',metrics.paid,'Completed payments','↑ 18%','green'],['Payment Pending',metrics.pending,'Follow-up needed','Action required','amber'],['Abandoned Booking',metrics.abandoned,'Form fill, no payment','₹1.4L opportunity','red'],['Monthly Revenue','₹3.24L','Net collected','Target ₹5L','gold'],['Conversion Rate',metrics.conv+'%','Leads → Paid','Industry avg 28%','amber'],['Top Service','Kundali','Kundali Milan ₹14,999','22 bookings','green'],['Upsell Opportunity',metrics.upsell,'Basic → Premium ready','₹2.5L potential','gold']].map(x=>`<div class="card kpi" style="--accent:var(--${x[4]==='gold'?'gold':x[4]})"><div class="label">${x[0]}</div><div class="value">${x[1]}</div><div class="sub">${x[2]}</div><span class="badge ${x[4]}">${x[3]}</span></div>`).join('');let max=Math.max(...months.map(m=>m[1]));document.getElementById('bars').innerHTML=months.map(m=>`<div class="barCol"><div class="bar" title="₹${m[1]}K" style="height:${m[1]/max*100}%"></div><div class="barLab">${m[0]}</div></div>`).join('');document.getElementById('totalText').textContent='Total YTD: ₹18.6L';document.getElementById('services').innerHTML=services.map((s,i)=>`<tr><td><span class="rank">${i+1}</span>${s[0]}</td><td class="right">${s[1]}</td><td class="right">${fmt(s[2])}</td></tr>`).join('');document.getElementById('funnel').innerHTML=funnel.map(f=>`<div class="frow"><div class="sub">${f[0]}</div><div class="fbar"><div class="fill" style="width:${f[2]}%;background:${f[3]}">${f[1]}</div></div><div class="sub right">${f[2]}%</div></div>`).join('');document.getElementById('upsells').innerHTML=upsells.map(u=>`<div class="item"><div><b>${u[0]}</b><small>${u[1]}</small><small>${u[2]}</small></div><button class="miniBtn" onclick="copyMsg('upsell','${u[0]}')">Send Upsell</button></div>`).join('');document.getElementById('abandoned').innerHTML=abandoned.map(a=>`<div class="item"><div><b>${a[0]}</b><small style="color:#e74c3c">${a[1]}</small></div><button class="miniBtn" onclick="copyMsg('recover','${a[0]}')">${a[2]}</button></div>`).join('')}
function copyMsg(type,name){let msg=type==='upsell'?`Namaste ${name}, aapke liye premium consultation/recommendation available hai. Kya main details bheju?`:`Namaste ${name}, aapki booking incomplete hai. Aaj confirm karne par priority slot mil sakta hai.`;navigator.clipboard&&navigator.clipboard.writeText(msg);toast('WhatsApp message copied')}
function exportData(){let data={metrics,months,services,funnel,upsells,abandoned};navigator.clipboard&&navigator.clipboard.writeText(JSON.stringify(data,null,2));toast('Analytics data copied')}
function changePeriod(){toast('Period changed: '+document.getElementById('period').value)}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}render();
</script>
</body>
</html>
