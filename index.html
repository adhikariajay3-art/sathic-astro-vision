<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATHIC ASTRO VISION™ AIOS v4.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}body{background:#07050f;color:rgba(255,255,255,.88);font-family:'Cinzel',serif;overflow-x:hidden}canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}.background-gradient{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(80,40,140,.2) 0%,transparent 55%),radial-gradient(ellipse 55% 70% at 88% 85%,rgba(30,60,130,.16) 0%,transparent 50%);pointer-events:none;z-index:0}#root{position:relative;z-index:2;max-width:940px;margin:0 auto;padding:24px 16px;min-height:100vh}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.88);font-family:'Share Tech Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s;margin-bottom:10px}.inp:focus{border-color:rgba(160,100,255,.55);box-shadow:0 0 0 3px rgba(160,100,255,.1)}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:11px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;padding:11px 22px;transition:all .2s;border:1px solid transparent;width:100%}.btn-primary{background:linear-gradient(135deg,rgba(160,100,255,.85),rgba(80,100,255,.85));border-color:rgba(160,100,255,.5);color:#fff;box-shadow:0 4px 20px rgba(160,100,255,.3)}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(160,100,255,.45)}.btn-ghost{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.55)}.btn-ghost:hover{background:rgba(255,255,255,.1)}.card{background:rgba(14,10,30,.92);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px 22px;backdrop-filter:blur(16px);position:relative;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,.5);margin-bottom:14px;animation:fadeUp .5s ease}.card-glow{position:absolute;top:-60px;right:-60px;width:160px;height:160px;border-radius:50%;background:rgba(160,100,255,1);opacity:.06;filter:blur(40px);pointer-events:none}h1{font-size:clamp(18px,4vw,26px);font-weight:700;background:linear-gradient(135deg,#fff 0%,#c8aaff 50%,#80c8ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.subtitle{font-size:10px;color:rgba(255,255,255,.35);font-family:'Share Tech Mono',monospace}.flex-center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}.grid{display:grid;gap:12px}.error-box{font-size:10px;font-family:'Share Tech Mono',monospace;color:#ff7070;background:rgba(255,100,100,.08);border:1px solid rgba(255,100,100,.2);border-radius:8px;padding:8px 12px}.client-item{padding:12px;background:rgba(160,100,255,.06);border:1px solid rgba(160,100,255,.12);border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.client-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,rgba(160,100,255,.3),rgba(80,130,255,.3));border:1px solid rgba(160,100,255,.2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel';font-size:14px;color:rgba(255,255,255,.7)}.client-info{flex:1}.client-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.88)}.client-details{font-size:9px;color:rgba(255,255,255,.35);font-family:'Share Tech Mono'}.text-center{text-align:center}.empty-state{padding:40px 20px;text-align:center;font-size:14px;color:rgba(255,255,255,.4)}
    </style>
</head>
<body>
    <div class="background-gradient"></div><canvas id="stars"></canvas><div id="root"></div>
    <script>
        const canvas=document.getElementById('stars');const ctx=canvas.getContext('2d');function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}resizeCanvas();window.addEventListener('resize',resizeCanvas);const stars=Array.from({length:200},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+.2,sp:Math.random()*.004+.001}));function drawStars(t){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(star=>{const alpha=.2+.6*Math.sin(t*star.sp);ctx.beginPath();ctx.arc(star.x,star.y,star.r,0,Math.PI*2);ctx.fillStyle=`rgba(210,190,255,${alpha})`;ctx.fill()});requestAnimationFrame(drawStars)}drawStars(0);
        class SathicApp{constructor(){this.screen='login';this.consultant=null;this.clients=[];this.formData={name:'',dob:'',tob:'',place:'',gender:'Male'};this.newConsultantForm={name:'',pin:'',spec:'Vedic Jyotish'};this.error='';this.mode='login';this.init()}init(){const session=JSON.parse(localStorage.getItem('sathic_session')||'null');if(session){const consultants=JSON.parse(localStorage.getItem('sathic_consultants')||'[]');const c=consultants.find(x=>x.id===session.id);if(c){this.consultant=c;this.clients=c.clients||[];this.screen='dashboard'}}this.render()}saveConsultant(){const consultants=JSON.parse(localStorage.getItem('sathic_consultants')||'[]');const idx=consultants.findIndex(c=>c.id===this.consultant.id);if(idx>=0){consultants[idx].clients=this.clients}else{this.consultant.clients=this.clients;consultants.push(this.consultant)}localStorage.setItem('sathic_consultants',JSON.stringify(consultants))}handleLogin(){if(!this.newConsultantForm.name||this.newConsultantForm.pin.length<4){this.error='सब fields fill करो!';this.render();return}const consultants=JSON.parse(localStorage.getItem('sathic_consultants')||'[]');if(this.mode==='login'){const c=consultants.find(x=>x.name===this.newConsultantForm.name&&x.pin===this.newConsultantForm.pin);if(!c){this.error='गलत credentials!';this.render();return}this.consultant=c;this.clients=c.clients||[]}else{if(consultants.some(x=>x.name===this.newConsultantForm.name)){this.error='पहले से exist करता है!';this.render();return}this.consultant={id:Date.now().toString(),name:this.newConsultantForm.name,spec:this.newConsultantForm.spec,pin:this.newConsultantForm.pin,avatar:this.newConsultantForm.name.charAt(0).toUpperCase(),clients:[]};consultants.push(this.consultant);localStorage.setItem('sathic_consultants',JSON.stringify(consultants));this.clients=[]}localStorage.setItem('sathic_session',JSON.stringify({id:this.consultant.id,name:this.consultant.name}));this.screen='dashboard';this.error='';this.render()}handleLogout(){localStorage.removeItem('sathic_session');this.consultant=null;this.clients=[];this.screen='login';this.mode='login';this.error='';this.render()}handleAddClient(){if(!this.formData.name||!this.formData.dob||!this.formData.tob||!this.formData.place){alert('सब fields fill करो!');return}const client={...this.formData,id:Date.now().toString(),createdAt:new Date().toISOString()};this.clients.unshift(client);this.saveConsultant();this.formData={name:'',dob:'',tob:'',place:'',gender:'Male'};this.screen='dashboard';this.render()}handleDeleteClient(id){this.clients=this.clients.filter(c=>c.id!==id);this.saveConsultant();this.render()}renderLoginScreen(){return `<div class="flex-center"><div class="card" style="max-width:400px;width:100%;"><div class="card-glow"></div><div style="position:relative;z-index:1;"><div class="text-center" style="margin-bottom:24px;"><svg width="60" height="60" style="margin:0 auto;margin-bottom:12px;animation:spin 20s linear infinite;"><circle cx="30" cy="30" r="8" fill="none" stroke="rgba(160,100,255,.4)" stroke-width=".5"/><circle cx="30" cy="30" r="4" fill="rgba(160,100,255,.6)"/></svg><h1 style="font-size:18px;">SATHIC ASTRO VISION™</h1><div class="subtitle" style="margin-top:4px;">CONSULTANT PORTAL</div></div><div class="grid"><input type="text" class="inp" placeholder="नाम" value="${this.newConsultantForm.name}" onchange="app.newConsultantForm.name=this.value">${this.mode==='register'?`<select class="inp" onchange="app.newConsultantForm.spec=this.value" style="color:rgba(255,255,255,.88);"><option>Vedic Jyotish</option><option>Nakshatra Specialist</option><option>Dasha Analyst</option></select>`:''}<input type="password" class="inp" placeholder="PIN (4-6 digits)" maxlength="6" value="${this.newConsultantForm.pin}" onchange="app.newConsultantForm.pin=this.value.slice(0,6)">${this.error?`<div class="error-box">${this.error}</div>`:''}<button class="btn btn-primary" onclick="app.handleLogin()" style="width:100%;">${this.mode==='login'?'↩ Login':'✦ Register'}</button></div><div class="text-center" style="margin-top:14px;"><button class="btn btn-ghost" style="width:auto;padding:6px 14px;font-size:10px;" onclick="app.mode=app.mode==='login'?'register':'login';app.error='';app.render();">${this.mode==='login'?'नया Consultant?':'पहले से है?'}</button></div></div></div></div>`}renderDashboard(){return `<div style="animation:fadeUp .4s ease;"><div class="flex-between"><div><div style="font-size:9px;letter-spacing:.3em;color:rgba(160,100,255,.6);font-family:'Share Tech Mono';">SATHIC ASTRO VISION™ AIOS</div><h1>${this.consultant.name}</h1><div class="subtitle" style="margin-top:4px;">${this.consultant.spec} · ${this.clients.length} clients</div></div><div style="display:flex;gap:8px;"><button class="btn btn-primary" style="width:auto;" onclick="app.screen='new-client';app.render();">✦ New Client</button><button class="btn btn-ghost" style="width:auto;" onclick="app.handleLogout();">Logout</button></div></div>${this.clients.length===0?`<div class="card text-center"><div style="font-size:40px;margin-bottom:12px;opacity:.3;">◈</div><div class="empty-state">कोई clients नहीं। अपना पहला consultation शुरू करो।</div></div>`:`<div class="grid">${this.clients.map((client,i)=>`<div class="client-item" style="animation:fadeUp .4s ease ${i*.06}s both;"><div style="display:flex;align-items:center;gap:12px;"><div class="client-avatar">${client.name.charAt(0).toUpperCase()}</div><div class="client-info"><div class="client-name">${client.name}</div><div class="client-details">${client.dob} · ${client.tob} · ${client.place}</div></div></div><button class="btn btn-ghost" style="width:auto;padding:8px 14px;font-size:11px;" onclick="alert('View Report feature coming soon!');">View</button><button class="btn btn-ghost" onclick="app.handleDeleteClient('${client.id}');" style="width:auto;padding:8px 12px;font-size:14px;color:rgba(255,100,100,.5);">✕</button></div>`).join('')}</div>`}</div>`}renderNewClientScreen(){return `<div style="animation:fadeUp .4s ease;"><button class="btn btn-ghost" style="width:auto;margin-bottom:16px;" onclick="app.screen='dashboard';app.render();">← Back</button><div class="card"><div class="card-glow" style="background:#a064ff;"></div><div style="position:relative;z-index:1;"><div style="font-size:9px;letter-spacing:.3em;color:rgba(160,100,255,.6);font-family:'Share Tech Mono';margin-bottom:16px;">◈ NEW CLIENT ANALYSIS</div><div class="grid"><input type="text" class="inp" placeholder="Client का नाम" value="${this.formData.name}" onchange="app.formData.name=this.value"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><input type="date" class="inp" value="${this.formData.dob}" style="color-scheme:dark;" onchange="app.formData.dob=this.value"><input type="time" class="inp" value="${this.formData.tob}" style="color-scheme:dark;" onchange="app.formData.tob=this.value"></div><input type="text" class="inp" placeholder="Place of birth" value="${this.formData.place}" onchange="app.formData.place=this.value"><select class="inp" value="${this.formData.gender}" style="color:rgba(255,255,255,.88);" onchange="app.formData.gender=this.value"><option>Male</option><option>Female</option><option>Other</option></select><button class="btn btn-primary" onclick="app.handleAddClient();" style="width:100%;">⬡ Add Client</button></div></div></div></div>`}render(){const root=document.getElementById('root');if(this.screen==='login')root.innerHTML=this.renderLoginScreen();else if(this.screen==='dashboard')root.innerHTML=this.renderDashboard();else if(this.screen==='new-client')root.innerHTML=this.renderNewClientScreen()}}
        const app=new SathicApp();
    </script>
</body>
</html>
