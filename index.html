<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SATHIC ASTRO VISION™ AIOS v4.2</title><style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{background:#07050f;color:rgba(255,255,255,.88);font-family:'Cinzel',serif;overflow-x:hidden}canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}.background-gradient{position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(80,40,140,.2) 0%,transparent 55%),radial-gradient(ellipse 55% 70% at 88% 85%,rgba(30,60,130,.16) 0%,transparent 50%);z-index:0}#root{position:relative;z-index:2;max-width:940px;margin:0 auto;padding:24px 16px;min-height:100vh}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.88);font-family:'Share Tech Mono',monospace;font-size:13px;padding:11px 14px;outline:none;margin-bottom:10px}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:11px;cursor:pointer;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.1em;padding:11px 22px;transition:.2s;border:1px solid transparent;width:100%}.btn-primary{background:linear-gradient(135deg,rgba(160,100,255,.85),rgba(80,100,255,.85));border-color:rgba(160,100,255,.5);color:#fff;box-shadow:0 4px 20px rgba(160,100,255,.3)}.btn-ghost{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}.card{background:rgba(14,10,30,.92);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:20px 22px;backdrop-filter:blur(16px);position:relative;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,.5);margin-bottom:14px;animation:fadeUp .5s ease}.card-glow{position:absolute;top:-60px;right:-60px;width:160px;height:160px;border-radius:50%;background:rgba(160,100,255,1);opacity:.06;filter:blur(40px);pointer-events:none}h1{font-size:clamp(18px,4vw,26px);font-weight:700;background:linear-gradient(135deg,#fff 0%,#c8aaff 50%,#80c8ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.subtitle{font-size:10px;color:rgba(255,255,255,.35);font-family:'Share Tech Mono',monospace}.flex-center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}.grid{display:grid;gap:12px}.error-box{font-size:10px;font-family:'Share Tech Mono',monospace;color:#ff7070;background:rgba(255,100,100,.08);border:1px solid rgba(255,100,100,.2);border-radius:8px;padding:8px 12px}.client-item{padding:12px;background:rgba(160,100,255,.06);border:1px solid rgba(160,100,255,.12);border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.client-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,rgba(160,100,255,.3),rgba(80,130,255,.3));border:1px solid rgba(160,100,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px}.client-info{flex:1}.client-name{font-size:13px;font-weight:600}.client-details,.mono{font-size:10px;color:rgba(255,255,255,.45);font-family:'Share Tech Mono'}.text-center{text-align:center}.empty-state{padding:40px 20px;text-align:center;font-size:14px;color:rgba(255,255,255,.4)}.report-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.report-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px}.report-box b{display:block;font-size:11px;color:#c8aaff;margin-bottom:6px}.report-box span,.report-box p,.report-box li{font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.65;color:rgba(255,255,255,.84)}.section-title{font-size:13px;color:#ffd166;margin:18px 0 8px;letter-spacing:.08em}.report-box ul{padding-left:18px}@media(max-width:650px){.report-grid{grid-template-columns:1fr}.btn{font-size:10px;padding:10px 14px}}</style></head><body><div class="background-gradient"></div><canvas id="stars"></canvas><div id="root"></div><script>const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');function resizeCanvas(){canvas.width=innerWidth;canvas.height=innerHeight}resizeCanvas();addEventListener('resize',resizeCanvas);const stars=Array.from({length:160},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.2+.2,sp:Math.random()*.004+.001}));function drawStars(t){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{let a=.2+.6*Math.sin(t*s.sp);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(210,190,255,${a})`;ctx.fill()});requestAnimationFrame(drawStars)}drawStars(0);function reportProfile(c){let key=(c.name+' '+c.dob+' '+c.place).toLowerCase();let ajay=key.includes('ajay')||c.dob==='1988-05-14';return ajay?{lagna:'मेष लग्न',rashi:'मेष राशि',nak:'अश्विनी नक्षत्र',nature:'Warrior Mind + Strong Leadership + तेज निर्णय शक्ति',career:'स्वयं का काम, consulting, management, astrology guidance, public dealing और online business आपके लिए अच्छे रहेंगे। नौकरी में authority role बेहतर रहेगा।',money:'धन योग है, लेकिन पैसा रोकने के लिए planning, long-term investment और खर्च नियंत्रण जरूरी है। partnership में blind trust न करें।',marriage:'विवाह/relationship में loyalty strong है, पर ego और जल्दी reaction से tension बन सकती है। communication soft रखना जरूरी है।',sadesati:'2025 से साढ़ेसाती का प्रभाव discipline, patience, खर्च नियंत्रण और कर्म correction सिखा रहा है। 2027-2028 transformation phase रहेगा।'}:{lagna:'लग्न गणना pending',rashi:'राशि गणना pending',nak:'नक्षत्र गणना pending',nature:'Client के जन्म विवरण के आधार पर detailed kundali calculation backend/API जोड़ने पर automatic हो सकती है।',career:'क्लाइंट की skills, discipline और जन्म विवरण देखकर career direction finalize करें।',money:'धन के लिए regular saving, clear pricing और impulsive खर्च से बचना सलाह योग्य है।',marriage:'Relationship analysis के लिए 7th house, Venus, Jupiter और Navamsha की detailed checking जरूरी होगी।',sadesati:'साढ़ेसाती/गोचर analysis के लिए Moon sign calculation module add करना होगा।'}}class SathicApp{constructor(){this.screen='login';this.selectedClient=null;this.consultant=null;this.clients=[];this.formData={name:'',dob:'',tob:'',place:'',gender:'Male'};this.newConsultantForm={name:'',pin:'',spec:'Vedic Jyotish'};this.error='';this.mode='login';this.init()}init(){let s=JSON.parse(localStorage.getItem('sathic_session')||'null');if(s){let cs=JSON.parse(localStorage.getItem('sathic_consultants')||'[]');let c=cs.find(x=>x.id===s.id);if(c){this.consultant=c;this.clients=c.clients||[];this.screen='dashboard'}}this.render()}saveConsultant(){let cs=JSON.parse(localStorage.getItem('sathic_consultants')||'[]');let i=cs.findIndex(c=>c.id===this.consultant.id);if(i>=0)cs[i].clients=this.clients;else{this.consultant.clients=this.clients;cs.push(this.consultant)}localStorage.setItem('sathic_consultants',JSON.stringify(cs))}handleLogin(){if(!this.newConsultantForm.name||this.newConsultantForm.pin.length<4){this.error='सब fields fill करो!';this.render();return}let cs=JSON.parse(localStorage.getItem('sathic_consultants')||'[]');if(this.mode==='login'){let c=cs.find(x=>x.name===this.newConsultantForm.name&&x.pin===this.newConsultantForm.pin);if(!c){this.error='गलत credentials!';this.render();return}this.consultant=c;this.clients=c.clients||[]}else{if(cs.some(x=>x.name===this.newConsultantForm.name)){this.error='पहले से exist करता है!';this.render();return}this.consultant={id:Date.now().toString(),name:this.newConsultantForm.name,spec:this.newConsultantForm.spec,pin:this.newConsultantForm.pin,clients:[]};cs.push(this.consultant);localStorage.setItem('sathic_consultants',JSON.stringify(cs));this.clients=[]}localStorage.setItem('sathic_session',JSON.stringify({id:this.consultant.id,name:this.consultant.name}));this.screen='dashboard';this.error='';this.render()}handleLogout(){localStorage.removeItem('sathic_session');this.consultant=null;this.clients=[];this.screen='login';this.mode='login';this.error='';this.render()}handleAddClient(){if(!this.formData.name||!this.formData.dob||!this.formData.tob||!this.formData.place){alert('सब fields fill करो!');return}let client={...this.formData,id:Date.now().toString(),createdAt:new Date().toISOString()};this.clients.unshift(client);this.saveConsultant();this.formData={name:'',dob:'',tob:'',place:'',gender:'Male'};this.screen='dashboard';this.render()}handleDeleteClient(id){if(confirm('Delete this client?')){this.clients=this.clients.filter(c=>c.id!==id);this.saveConsultant();this.render()}}viewClient(id){this.selectedClient=this.clients.find(c=>c.id===id);this.screen='report';this.render()}renderLoginScreen(){return `<div class="flex-center"><div class="card" style="max-width:400px;width:100%"><div class="card-glow"></div><div class="text-center" style="margin-bottom:24px"><svg width="60" height="60" style="margin:0 auto 12px;animation:spin 20s linear infinite"><circle cx="30" cy="30" r="8" fill="none" stroke="rgba(160,100,255,.4)"/><circle cx="30" cy="30" r="4" fill="rgba(160,100,255,.6)"/></svg><h1 style="font-size:18px">SATHIC ASTRO VISION™</h1><div class="subtitle">CONSULTANT PORTAL</div></div><div class="grid"><input class="inp" placeholder="नाम" value="${this.newConsultantForm.name}" onchange="app.newConsultantForm.name=this.value">${this.mode==='register'?`<select class="inp" onchange="app.newConsultantForm.spec=this.value"><option>Vedic Jyotish</option><option>Nakshatra Specialist</option><option>Dasha Analyst</option></select>`:''}<input type="password" class="inp" placeholder="PIN (4-6 digits)" maxlength="6" value="${this.newConsultantForm.pin}" onchange="app.newConsultantForm.pin=this.value.slice(0,6)">${this.error?`<div class="error-box">${this.error}</div>`:''}<button class="btn btn-primary" onclick="app.handleLogin()">${this.mode==='login'?'↩ Login':'✦ Register'}</button></div><div class="text-center" style="margin-top:14px"><button class="btn btn-ghost" style="width:auto;padding:6px 14px;font-size:10px" onclick="app.mode=app.mode==='login'?'register':'login';app.error='';app.render();">${this.mode==='login'?'नया Consultant?':'पहले से है?'}</button></div></div></div>`}renderDashboard(){return `<div><div class="flex-between"><div><div class="mono">SATHIC ASTRO VISION™ AIOS</div><h1>${this.consultant.name}</h1><div class="subtitle">${this.consultant.spec} · ${this.clients.length} clients</div></div><div style="display:flex;gap:8px"><button class="btn btn-primary" style="width:auto" onclick="app.screen='new-client';app.render();">✦ New Client</button><button class="btn btn-ghost" style="width:auto" onclick="app.handleLogout();">Logout</button></div></div>${this.clients.length===0?`<div class="card text-center"><div style="font-size:40px;margin-bottom:12px;opacity:.3">◈</div><div class="empty-state">कोई clients नहीं। अपना पहला consultation शुरू करो।</div></div>`:`<div class="grid">${this.clients.map((c,i)=>`<div class="client-item"><div style="display:flex;align-items:center;gap:12px"><div class="client-avatar">${c.name.charAt(0).toUpperCase()}</div><div class="client-info"><div class="client-name">${c.name}</div><div class="client-details">${c.dob} · ${c.tob} · ${c.place}</div></div></div><button class="btn btn-primary" style="width:auto;padding:8px 14px;font-size:11px" onclick="app.viewClient('${c.id}')">View Report</button><button class="btn btn-ghost" onclick="app.handleDeleteClient('${c.id}')" style="width:auto;padding:8px 12px;color:rgba(255,100,100,.75)">✕</button></div>`).join('')}</div>`}</div>`}renderNewClientScreen(){return `<button class="btn btn-ghost" style="width:auto;margin-bottom:16px" onclick="app.screen='dashboard';app.render();">← Back</button><div class="card"><div class="card-glow"></div><div class="mono" style="margin-bottom:16px">◈ NEW CLIENT ANALYSIS</div><input class="inp" placeholder="Client का नाम" value="${this.formData.name}" onchange="app.formData.name=this.value"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><input type="date" class="inp" value="${this.formData.dob}" style="color-scheme:dark" onchange="app.formData.dob=this.value"><input type="time" class="inp" value="${this.formData.tob}" style="color-scheme:dark" onchange="app.formData.tob=this.value"></div><input class="inp" placeholder="Place of birth" value="${this.formData.place}" onchange="app.formData.place=this.value"><select class="inp" onchange="app.formData.gender=this.value"><option>Male</option><option>Female</option><option>Other</option></select><button class="btn btn-primary" onclick="app.handleAddClient()">⬡ Add Client</button></div>`}renderReport(){let c=this.selectedClient;if(!c)return this.renderDashboard();let p=reportProfile(c),added=c.createdAt?new Date(c.createdAt).toLocaleString():'N/A';return `<button class="btn btn-ghost" style="width:auto;margin-bottom:16px" onclick="app.screen='dashboard';app.render();">← Back to Dashboard</button><div class="card"><div class="card-glow"></div><div class="mono" style="margin-bottom:10px">◈ CLIENT REPORT</div><h1>${c.name}</h1><div class="subtitle" style="margin-bottom:18px">SATHIC ASTRO VISION™ Professional Kundali Report</div><div class="report-grid"><div class="report-box"><b>Name</b><span>${c.name}</span></div><div class="report-box"><b>Date of Birth</b><span>${c.dob}</span></div><div class="report-box"><b>Time of Birth</b><span>${c.tob}</span></div><div class="report-box"><b>Birth Place</b><span>${c.place}</span></div><div class="report-box"><b>Gender</b><span>${c.gender}</span></div><div class="report-box"><b>Added Date</b><span>${added}</span></div></div><div class="section-title">Basic Kundali Analysis</div><div class="report-box"><p><b>लग्न:</b> ${p.lagna}</p><p><b>राशि:</b> ${p.rashi}</p><p><b>नक्षत्र:</b> ${p.nak}</p><p><b>स्वभाव:</b> ${p.nature}</p></div><div class="section-title">Career Analysis</div><div class="report-box"><p>${p.career}</p></div><div class="section-title">Money & Business Analysis</div><div class="report-box"><p>${p.money}</p><ul><li>जल्दबाजी में investment न करें।</li><li>Client record और payment tracking regular रखें।</li><li>Brand name और online presence बढ़ाएं।</li></ul></div><div class="section-title">Marriage / Relationship Analysis</div><div class="report-box"><p>${p.marriage}</p></div><div class="section-title">Sade Sati / Transit Effect</div><div class="report-box"><p>${p.sadesati}</p></div><div class="section-title">Lal Kitab & Practical Remedies</div><div class="report-box"><ul><li>प्रतिदिन सुबह सूर्य को जल दें।</li><li>मंगलवार को हनुमान चालीसा पढ़ें।</li><li>शनिवार को काले तिल/उड़द दान करें।</li><li>क्रोध, जल्दबाजी और अधूरे वादों से बचें।</li><li>गरीब/मजदूर की सेवा करें और समय की पाबंदी रखें।</li></ul></div><div class="section-title">Business Success Formula</div><div class="report-box"><ul><li>Consultation packages clear रखें।</li><li>हर client की DOB, TOB, place और notes save करें।</li><li>Follow-up date और payment status feature next upgrade में add करें।</li><li>Report print करके PDF में clients को भेजें।</li></ul></div><button class="btn btn-primary" style="margin-top:14px" onclick="window.print()">Print / Save PDF</button></div>`}render(){let r=document.getElementById('root');if(this.screen==='login')r.innerHTML=this.renderLoginScreen();else if(this.screen==='dashboard')r.innerHTML=this.renderDashboard();else if(this.screen==='new-client')r.innerHTML=this.renderNewClientScreen();else if(this.screen==='report')r.innerHTML=this.renderReport()}}const app=new SathicApp();</script></body></html>
