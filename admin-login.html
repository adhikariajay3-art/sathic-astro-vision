<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin Login</title><style>body{margin:0;background:#07050f;color:#fff;font-family:Arial,Helvetica,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:18px}.box{max-width:420px;width:100%;background:#0e0a1e;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px}h1{color:#ffd166}input{width:100%;box-sizing:border-box;padding:13px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:#080512;color:#fff;font-size:16px}button{width:100%;margin-top:12px;padding:13px;border:0;border-radius:12px;background:linear-gradient(135deg,#8d5cff,#4d7cff);color:#fff;font-weight:700;font-size:16px}.err{color:#ff6b6b;margin-top:10px}.note{color:#ccc;line-height:1.6;font-size:14px}</style></head><body><div class="box"><h1>🔐 Admin Login</h1><p class="note">Static safety lock. PIN डालकर admin dashboard खोलें।</p><input id="pin" type="password" placeholder="Enter PIN"><button onclick="login()">Open Admin</button><div id="err" class="err"></div><p class="note">Default PIN: 108108<br>इसे बाद में code में बदल सकते हैं।</p></div><script>function login(){const p=document.getElementById('pin').value.trim();if(p==='108108'){sessionStorage.setItem('sathic_admin','yes');location.href='admin-dashboard.html'}else{document.getElementById('err').textContent='गलत PIN'}}</script></body></html>
