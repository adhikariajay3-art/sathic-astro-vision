<!DOCTYPE html>
<html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Payment Confirmation - SATHIC ASTRO VISION</title><style>body{margin:0;background:#07050f;color:#fff;font-family:Arial,Helvetica,sans-serif;padding:18px}.wrap{max-width:760px;margin:auto}.card{background:#0e0a1e;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(0,0,0,.35)}h1{color:#ffd166}.field{width:100%;box-sizing:border-box;background:#080512;color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:12px;margin:8px 0}.btn{background:linear-gradient(135deg,#1b8f73,#25d366);border:0;color:#fff;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}.note{color:#ccc;line-height:1.7}.upi{background:#080512;border:1px dashed rgba(255,209,102,.45);border-radius:14px;padding:12px;color:#ffd166;margin:12px 0}</style></head><body><div class="wrap"><div class="card"><h1>✅ Payment Confirmation</h1><p class="note">Payment करने के बाद नीचे details भरें और message copy करके screenshot के साथ WhatsApp/DM में भेजें.</p><div class="upi">UPI ID: <b>adhikari.ajay3-2@okicici</b></div><input class="field" id="name" placeholder="Name"><input class="field" id="phone" placeholder="WhatsApp Number"><input class="field" id="product" placeholder="Product / Service"><input class="field" id="amount" placeholder="Paid Amount"><input class="field" id="txn" placeholder="UPI Transaction ID"><textarea class="field" id="note" rows="4" placeholder="Extra note / birth details"></textarea><button class="btn" onclick="copyMsg()">Confirmation Message Copy करें</button></div></div><script>function copyMsg(){let msg=`Payment Confirmation - SATHIC ASTRO VISION\n\nName: ${name.value}\nPhone: ${phone.value}\nProduct: ${product.value}\nAmount: ${amount.value}\nUPI Transaction ID: ${txn.value}\nNote: ${note.value}\n\nPayment screenshot attached.`;navigator.clipboard.writeText(msg);alert('Confirmation copied! Screenshot के साथ भेजें.');}</script></body></html>
