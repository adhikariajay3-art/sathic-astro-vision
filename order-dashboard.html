<!DOCTYPE html>
<html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SATHIC Order Dashboard</title><style>body{margin:0;background:#07050f;color:#fff;font-family:Arial,Helvetica,sans-serif;padding:18px}.wrap{max-width:1100px;margin:auto}h1{color:#ffd166}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.card,.panel{background:#0e0a1e;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px}.num{font-size:26px;color:#c8aaff;font-weight:800}.field{width:100%;box-sizing:border-box;background:#080512;color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:9px;padding:10px;margin:6px 0}button{background:linear-gradient(135deg,#8d5cff,#4d7cff);border:0;color:#fff;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer}.danger{background:#672331}table{width:100%;border-collapse:collapse;margin-top:14px}th,td{padding:9px;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;text-align:left}th{color:#ffd166}.note{color:#bbb;line-height:1.6}</style></head><body><div class="wrap"><h1>📦 SATHIC Order Dashboard</h1><p class="note">Payment screenshot मिलने के बाद order यहाँ add करें और delivery status track करें.</p><div class="grid"><div class="card">Total Orders<div class="num" id="total">0</div></div><div class="card">Paid<div class="num" id="paid">0</div></div><div class="card">Delivered<div class="num" id="delivered">0</div></div><div class="card">Revenue<div class="num" id="revenue">₹0</div></div></div><div class="panel"><input class="field" id="name" placeholder="Customer Name"><input class="field" id="phone" placeholder="WhatsApp"><select class="field" id="product"><option>108 Jyotish Remedies PDF</option><option>Vastu Checklist</option><option>Premium Kundli Report</option><option>Vastu Consultation</option><option>Monthly Membership</option><option>Astrology Workshop</option></select><input class="field" id="amount" type="number" placeholder="Amount"><input class="field" id="txn" placeholder="UPI Transaction ID"><select class="field" id="status"><option>Paid</option><option>Pending</option><option>Delivered</option><option>Refund/Adjust</option></select><textarea class="field" id="notes" rows="3" placeholder="Notes / delivery details"></textarea><button onclick="addOrder()">Add Order</button><button onclick="exportCSV()">Export CSV</button></div><table><thead><tr><th>Name</th><th>Phone</th><th>Product</th><th>Amount</th><th>Txn</th><th>Status</th><th>Notes</th><th>Action</th></tr></thead><tbody id="rows"></tbody></table></div><script>let orders=JSON.parse(localStorage.getItem('sathic_orders')||'[]');function r(n){return '₹'+Number(n||0).toLocaleString('en-IN')}function save(){localStorage.setItem('sathic_orders',JSON.stringify(orders))}function render(){let rev=0,p=0,d=0;rows.innerHTML='';orders.forEach((o,i)=>{if(o.status==='Paid'||o.status==='Delivered'){p++;rev+=Number(o.amount||0)}if(o.status==='Delivered')d++;rows.innerHTML+=`<tr><td>${o.name}</td><td>${o.phone}</td><td>${o.product}</td><td>${r(o.amount)}</td><td>${o.txn}</td><td><select onchange="orders[${i}].status=this.value;save();render()"><option ${o.status==='Paid'?'selected':''}>Paid</option><option ${o.status==='Pending'?'selected':''}>Pending</option><option ${o.status==='Delivered'?'selected':''}>Delivered</option><option ${o.status==='Refund/Adjust'?'selected':''}>Refund/Adjust</option></select></td><td>${o.notes||''}</td><td><button class="danger" onclick="del(${i})">Delete</button></td></tr>`});total.innerText=orders.length;paid.innerText=p;delivered.innerText=d;revenue.innerText=r(rev)}function addOrder(){if(!name.value||!phone.value){alert('Name और phone जरूरी है');return}orders.unshift({name:name.value,phone:phone.value,product:product.value,amount:amount.value,txn:txn.value,status:status.value,notes:notes.value,date:new Date().toISOString()});save();document.querySelectorAll('input,textarea').forEach(x=>x.value='');render()}function del(i){if(confirm('Delete order?')){orders.splice(i,1);save();render()}}function exportCSV(){let csv='Name,Phone,Product,Amount,Txn,Status,Notes\n'+orders.map(o=>[o.name,o.phone,o.product,o.amount,o.txn,o.status,o.notes].map(v=>'"'+String(v||'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='sathic-orders.csv';a.click()}render();</script></body></html>
